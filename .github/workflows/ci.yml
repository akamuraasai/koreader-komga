name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit tests + luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 5.1, not LuaJIT: LuaJIT can't load the oversized luarocks manifest.
      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"
      - uses: leafo/gh-actions-luarocks@v5

      - name: Install busted + luacheck
        run: |
          luarocks install busted
          luarocks install luacheck

      - name: Unit tests (pure modules)
        run: busted

      - name: Static analysis
        run: luacheck src spec
