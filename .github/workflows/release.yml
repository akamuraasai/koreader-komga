name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Release gate: the full KOReader-frontend e2e suite must pass before publishing.
  integration:
    name: e2e (kodev test front)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: koreader-komga

      - name: Checkout KOReader
        uses: actions/checkout@v4
        with:
          repository: koreader/koreader
          path: koreader
          submodules: recursive

      - name: Install build dependencies (per koreader/doc/Building.md)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y autoconf automake build-essential \
            ca-certificates cmake gcc-multilib gettext git libtool libtool-bin meson \
            nasm ninja-build patch pkg-config unzip wget
          sudo apt-get install --no-install-recommends -y libx11-dev libxcursor-dev libxext-dev \
            libxi-dev libxrandr-dev libxss-dev libxtst-dev

      - name: Cache koreader-base build
        uses: actions/cache@v4
        with:
          path: koreader/base/build
          key: kobase-${{ runner.os }}-${{ hashFiles('koreader/base/**') }}

      - name: Fetch third-party + build emulator
        working-directory: koreader
        run: |
          ./kodev fetch-thirdparty
          ./kodev build

      - name: Wire the plugin + integration spec into koreader
        run: |
          ln -sfn "$GITHUB_WORKSPACE/koreader-komga/src" koreader/plugins/komga.koplugin
          ln -sfn "$GITHUB_WORKSPACE/koreader-komga/spec/integration/komga_spec.lua" koreader/spec/unit/komga_spec.lua

      - name: Run integration tests
        working-directory: koreader
        run: ./kodev test front komga

  release:
    name: build + publish
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tag history for the commit appendix

      - name: Resolve version + validate against _meta.lua
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          META_VERSION="$(grep -oE 'version[[:space:]]*=[[:space:]]*"[^"]+"' src/_meta.lua | grep -oE '"[^"]+"' | tr -d '"')"
          if [ "$META_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $TAG (version $VERSION) != src/_meta.lua version $META_VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build plugin zip
        run: |
          rm -rf dist && mkdir dist
          cp -r src dist/komga.koplugin
          (cd dist && zip -r "komga.koplugin-${{ steps.ver.outputs.tag }}.zip" komga.koplugin)
          ls -l dist

      - name: Assemble release notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f=1; next }
            /^## \[/ { f=0 }
            f
          ' CHANGELOG.md > notes.md
          PREV="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -n1 || true)"
          {
            echo
            echo "### Commits"
            if [ -n "$PREV" ]; then
              git log "$PREV..$TAG" --oneline --no-merges
            else
              git log "$TAG" --oneline --no-merges
            fi
          } >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.tag }}
          body_path: notes.md
          prerelease: ${{ steps.ver.outputs.prerelease }}
          files: dist/komga.koplugin-${{ steps.ver.outputs.tag }}.zip
